proxy:
  name: BW-MCP
  state_directory: ~/.bw_mcp
  max_batch_size: 25
redaction:
  populated_tag: "[REDACTED_BY_PROXY_POPULATED]"
  empty_tag: "[REDACTED_BY_PROXY_EMPTY]"
security:
  payload_tag: "[PAYLOAD]"
  bw_password_env: BW_PASSWORD
  bw_session_env: BW_SESSION
wal_crypto:
  salt_length: 16
  key_length: 32
  iterations: 480000
audit:
  match_tag: "MATCH"
  mismatch_tag: "MISMATCH"
