name: bw-proxy

services:
  bw-proxy:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    environment:
      - BW_URL=${BW_URL:-https://vault.kpihx-labs.com}
      - BW_EMAIL=${BW_EMAIL}
      - BW_PROXY_DATA=/data
      - BITWARDENCLI_APPDATA_DIR=/data/bw-cli
      - HOME=/data
      - HITL_HOST=127.0.0.1
    volumes:
      - bw-data:/data

volumes:
  bw-data:
    name: bw_mcp_bw-data
